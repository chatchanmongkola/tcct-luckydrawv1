services:
  postgres:
    image: postgres:17-alpine
    container_name: luckydraw-db
    environment:
      POSTGRES_DB: ${DB_NAME:-luckydraw}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - luckydraw-network
    restart: unless-stopped

  adminer:
    image: adminer:4.8.1
    container_name: luckydraw-adminer
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - luckydraw-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  luckydraw-network:
    driver: bridge
